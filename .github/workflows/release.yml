name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to release, no leading v (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be MAJOR.MINOR.PATCH (no leading v). Got: '${{ inputs.version }}'"
            exit 1
          fi

      - name: Tag and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ inputs.version }}"
          MAJOR="v${V%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${V}"
          git tag -f "${MAJOR}"
          git push origin "v${V}"
          git push origin -f "${MAJOR}"

      - name: GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ inputs.version }}" --generate-notes
